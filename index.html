<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa – Casa Julián Alvarez</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #5a5e48;
      font-family: 'Georgia', serif;
      touch-action: none;
    }

    #viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    #viewport.dragging { cursor: grabbing; }

    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #map-img {
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .marker {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }

    #legend {
      position: fixed;
      top: 16px;
      left: 14px;
      z-index: 100;
    }
    .legend-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 5px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .legend-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #d4c4a0;
      color: #2a2e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .legend-info strong {
      display: block;
      color: #f5efe3;
      font-size: 13px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      line-height: 1.2;
    }
    .legend-info span {
      display: block;
      color: #c8bca8;
      font-size: 10px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      margin-top: 1px;
    }

    #zoom-controls {
      position: fixed;
      bottom: 24px;
      right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .zoom-btn {
      width: 36px;
      height: 36px;
      background: rgba(30, 33, 18, 0.75);
      border: none;
      border-radius: 5px;
      color: #f5efe3;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .zoom-btn:active { background: rgba(212,196,160,0.3); }

    #reset-btn {
      position: fixed;
      bottom: 24px;
      left: 14px;
      z-index: 100;
      background: rgba(30, 33, 18, 0.75);
      border: none;
      border-radius: 5px;
      color: #a09070;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 0 12px;
      height: 36px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #reset-btn:active { color: #f5efe3; }
  </style>
</head>
<body>

<div id="viewport">
  <div id="world">
    <img id="map-img" src="images/Casa%20Juli%C3%A1n%20Alvarez%20BG.png" alt="Mapa Palermo Buenos Aires">

    <div class="marker" data-id="1" data-x="0.570" data-y="0.255"></div>
    <div class="marker" data-id="2" data-x="0.715" data-y="0.855"></div>
    <div class="marker" data-id="3" data-x="0.318" data-y="0.555"></div>
    <div class="marker" data-id="4" data-x="0.158" data-y="0.505"></div>
    <div class="marker" data-id="5" data-x="0.096" data-y="0.608"></div>
    <div class="marker" data-id="6" data-x="0.300" data-y="0.375"></div>
    <div class="marker" data-id="7" data-x="0.820" data-y="0.850"></div>
  </div>
</div>

<div id="legend">
  <div class="legend-item" data-id="1">
    <div class="legend-num">1</div>
    <div class="legend-info"><strong>Malba</strong><span>Av. Figueroa Alcorta 3415</span></div>
  </div>
  <div class="legend-item" data-id="2">
    <div class="legend-num">2</div>
    <div class="legend-info"><strong>Teatro Colón</strong><span>Cerrito 628</span></div>
  </div>
  <div class="legend-item" data-id="3">
    <div class="legend-num">3</div>
    <div class="legend-info"><strong>Ninina</strong><span>Gorriti 4738</span></div>
  </div>
  <div class="legend-item" data-id="4">
    <div class="legend-num">4</div>
    <div class="legend-info"><strong>Chuí</strong><span>Loyola 1250</span></div>
  </div>
  <div class="legend-item" data-id="5">
    <div class="legend-num">5</div>
    <div class="legend-info"><strong>El Gordo Chanta</strong><span>Juan Ramírez de Velasco 1200</span></div>
  </div>
  <div class="legend-item" data-id="6">
    <div class="legend-num">6</div>
    <div class="legend-info"><strong>El Preferido</strong><span>Jorge Luis Borges 2108</span></div>
  </div>
  <div class="legend-item" data-id="7">
    <div class="legend-num">7</div>
    <div class="legend-info"><strong>La Ideal</strong><span>Suipacha 384</span></div>
  </div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">&#8722;</button>
</div>
<button id="reset-btn">Reset</button>

<script>
(function () {
  const CJA_X = 0.30, CJA_Y = 0.66;

  const viewport = document.getElementById('viewport');
  const world    = document.getElementById('world');
  const mapImg   = document.getElementById('map-img');

  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX, startY;
  let imgW = 0, imgH = 0;
  let initialScale, initialTx, initialTy;

  const MIN_SCALE = 0.2, MAX_SCALE = 5;

  function layoutMarkers() {
    imgW = mapImg.naturalWidth  || mapImg.offsetWidth;
    imgH = mapImg.naturalHeight || mapImg.offsetHeight;
    mapImg.style.width  = imgW + 'px';
    mapImg.style.height = imgH + 'px';
    world.style.width   = imgW + 'px';
    world.style.height  = imgH + 'px';
    document.querySelectorAll('.marker').forEach(el => {
      el.style.left = (parseFloat(el.dataset.x) * imgW) + 'px';
      el.style.top  = (parseFloat(el.dataset.y) * imgH) + 'px';
    });
  }

  function fitMap() {
    layoutMarkers();
    const vw = viewport.offsetWidth, vh = viewport.offsetHeight;
    if (vw < 900) {
      scale = vh / imgH;
      tx = vw / 2 - CJA_X * imgW * scale;
      ty = vh / 2 - CJA_Y * imgH * scale;
    } else {
      scale = Math.min(vw / imgW, vh / imgH);
      tx = (vw - imgW * scale) / 2;
      ty = (vh - imgH * scale) / 2;
    }
    clamp();
    initialScale = scale; initialTx = tx; initialTy = ty;
    applyTransform();
  }

  mapImg.addEventListener('load', fitMap);
  if (mapImg.complete && mapImg.naturalWidth) fitMap();

  function applyTransform() {
    world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function clamp() {
    const vw = viewport.offsetWidth, vh = viewport.offsetHeight;
    const pw = imgW * scale, ph = imgH * scale;
    const slack = 80;
    tx = Math.min(slack, Math.max(vw - pw - slack + (pw > vw ? 0 : pw - vw), tx));
    ty = Math.min(slack, Math.max(vh - ph - slack + (ph > vh ? 0 : ph - vh), ty));
  }

  function zoomAt(cx, cy, newScale) {
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
    const r = newScale / scale;
    tx = cx - r * (cx - tx); ty = cy - r * (cy - ty);
    scale = newScale; clamp(); applyTransform();
  }

  function panTo(fx, fy, targetScale) {
    if (scale < targetScale) scale = targetScale;
    const vw = viewport.offsetWidth, vh = viewport.offsetHeight;
    tx = vw / 2 - fx * imgW * scale;
    ty = vh / 2 - fy * imgH * scale;
    clamp(); applyTransform();
  }

  viewport.addEventListener('mousedown', e => {
    if (e.target.classList.contains('marker')) return;
    dragging = true;
    startX = e.clientX - tx; startY = e.clientY - ty;
    viewport.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = e.clientX - startX; ty = e.clientY - startY;
    clamp(); applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('dragging'); });

  viewport.addEventListener('wheel', e => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, scale * (e.deltaY < 0 ? 1.12 : 0.89));
  }, { passive: false });

  let lastDist = null;
  viewport.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      if (e.target.classList.contains('marker')) return;
      dragging = true;
      startX = e.touches[0].clientX - tx; startY = e.touches[0].clientY - ty;
    } else if (e.touches.length === 2) {
      dragging = false; lastDist = pinchDist(e.touches);
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      tx = e.touches[0].clientX - startX; ty = e.touches[0].clientY - startY;
      clamp(); applyTransform();
    } else if (e.touches.length === 2) {
      const d = pinchDist(e.touches), m = pinchMid(e.touches);
      if (lastDist) zoomAt(m.x, m.y, scale * (d / lastDist));
      lastDist = d;
    }
  }, { passive: false });

  viewport.addEventListener('touchend', e => {
    if (e.touches.length < 2) lastDist = null;
    if (e.touches.length === 0) dragging = false;
  });

  function pinchDist(t) {
    const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function pinchMid(t) {
    return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 };
  }

  document.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => {
      const marker = document.querySelector(`.marker[data-id="${item.dataset.id}"]`);
      if (!marker) return;
      panTo(parseFloat(marker.dataset.x), parseFloat(marker.dataset.y), initialScale * 1.3);
    });
  });

  document.getElementById('zoom-in').addEventListener('click', () => {
    zoomAt(viewport.offsetWidth / 2, viewport.offsetHeight / 2, scale * 1.35);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    zoomAt(viewport.offsetWidth / 2, viewport.offsetHeight / 2, scale / 1.35);
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    scale = initialScale; tx = initialTx; ty = initialTy;
    applyTransform();
  });

  window.addEventListener('resize', fitMap);
}());
</script>
</body>
</html>
